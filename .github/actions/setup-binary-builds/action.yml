name: Set up binary builds

description: Clean workspace and check out PyTorch

inputs:
  repository:
    description: If set to any value, don't use sudo to clean the workspace
    required: false
    type: string
    default: ''
  ref:
    description: Works as stated in actions/checkout
    required: false
    type: string
    default: nightly
  submodules:
    description: Works as stated in actions/checkout, but the default value is recursive
    required: false
    type: string
    default: recursive
  setup-miniconda:
    description: Set to true if setup-miniconda is needed
    required: false
    type: boolean
    default: false
  python-version:
    description: The target Python version
    required: true
    type: string
  cuda-version:
    description: The target CUDA version
    required: true
    type: string
  arch:
    description: The target ARCH
    required: true
    type: string
  upload-to-base-bucket:
    description: One of the parameter used by pkg-helpers
    required: false
    type: boolean
    default: no

runs:
  using: composite
  steps:
      - name: Remove repository directory (if exists)
        shell: bash
        env:
          REPOSITORY: ${{ inputs.repository }}
        run: |
          set -euxo pipefail
          rm -rf "${REPOSITORY}"

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.submodules }}
          path: ${{ inputs.repository }}

      - name: Log Available Webhook Fields
        shell: bash
        run: |
          echo "ENV VARS"
          echo "${GITHUB_REF_NAME}"
          echo "${GITHUB_REF}"
          echo "${GITHUB_BASE_REF}"

          echo "GITHUB PROVIDED"
          echo "${{ github.ref_name }}"
          echo "${{ github.event.ref }}"
          echo "${{ github.ref }}"
          echo "${{ github.base_ref }}"
      - name: Set artifact name
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
          CU_VERSION: ${{ inputs.cuda-version }}
          ARCH: ${{ inputs.arch }}
        run: |
          set -euxo pipefail
          # Set artifact name here since github actions doesn't have string manipulation tools
          # and "/" is not allowed in artifact names. //\//_ is to replace all forward slashes,
          # not just the first one
          # Convert long python version (e.g. 3.10.19) to short major.minor version
          # (e.g. 3.10), while preserving special suffixes like "t" (e.g. 3.13t, 3.14t)
          SHORT_PYTHON_VERSION=$(echo "${PYTHON_VERSION}" | sed -E 's/^([0-9]+\.[0-9]+[a-z]?).*/\1/')
          echo "ARTIFACT_NAME=${REPOSITORY//\//_}_${REF//\//_}_${SHORT_PYTHON_VERSION}_${CU_VERSION}_${ARCH}" >> "${GITHUB_ENV}"
      - name: Setup miniconda (for pytorch_pkg_helpers)
        if: ${{ inputs.setup-miniconda == 'true' }}
        uses: conda-incubator/setup-miniconda@v3.1.1
        with:
          miniconda-version: "latest"
          python-version: "3.10"
      - name: Clean conda environment
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          conda info | grep -i 'base environment'
          conda clean --all --quiet --yes
      - name: Reset channel priority
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          conda config --set channel_priority false
      - name: Generate file from pytorch_pkg_helpers
        working-directory: ${{ inputs.repository }}
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          CONDA_ENV="${RUNNER_TEMP}/pytorch_pkg_helpers_${GITHUB_RUN_ID}"
          conda create \
            --yes --quiet \
            --prefix "${CONDA_ENV}" \
            "python=3.10" pip
          CONDA_ENV="${CONDA_ENV}"
          CONDA_RUN="conda run --no-capture-output -p ${CONDA_ENV}"
          ${CONDA_RUN} python -m pip install ${GITHUB_WORKSPACE}/test-infra/tools/pkg-helpers
          BUILD_ENV_FILE="${RUNNER_TEMP}/build_env_${GITHUB_RUN_ID}"
          ${CONDA_RUN} python -m pytorch_pkg_helpers > "${BUILD_ENV_FILE}"
          cat "${BUILD_ENV_FILE}"
          echo "BUILD_ENV_FILE=${BUILD_ENV_FILE}" >> "${GITHUB_ENV}"
      - name: Setup conda environment for build
        shell: bash -l {0}
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          set -euxo pipefail
          CONDA_ENV="${RUNNER_TEMP}/conda_environment_${GITHUB_RUN_ID}"
          export CONDA_EXTRA_PARAM=""
          # Only pin conda on the Linux/Windows build containers. Their base env
          # ships an older conda and relies on the implicit `defaults` channel
          # that conda>=26 removed (upgrading them yields NoChannelsConfiguredError
          # on the conda create below). The macOS runners' base env is on Python
          # 3.14 -- which conda=25.3.0 has no build for (py314 starts at 26.1.0) --
          # and already ships a newer conda with channels configured, so leave it
          # untouched.
          if [[ "${RUNNER_OS}" != "macOS" ]]; then
            conda install -y conda=25.3.0
          elif [[ "${PYTHON_VERSION}" == 3.15* ]]; then
            # Newer macOS base conda 400s on the 3.15 label download; pin an older one.
            conda install -y python=3.11
            if [[ -n "$(conda list | grep conda-anaconda-telemetry)" ]]; then
              conda uninstall -y conda-anaconda-telemetry conda-anaconda-tos
            fi
            conda install -y conda=24.7.1 conda-libmamba-solver=24.1.0
          fi

          # Pin openssl=3.5.6 by default: openssl 3.5.7 regressed ASN.1 parsing
          # and rejects a malformed cert in the Windows machine cert store,
          # breaking ssl.create_default_context() with "[ASN1: NOT_ENOUGH_DATA]"
          # at smoke-test time. See https://github.com/pytorch/pytorch/pull/186846
          # The 3.15 cases below clear this: the 3.15 beta requires openssl>=3.5.7,
          # and 3.15 is Linux-only with its smoke test skipped, so the Windows
          # regression does not apply.
          export OPENSSL_PIN="openssl=3.5.6"

          # shellcheck disable=SC2153
          case $PYTHON_VERSION in
            3.15t)
              # 3.15 is a pre-release. conda-forge ships the beta interpreter
              # under its python_dev label, but that build depends on a
              # _python_rc marker package that only exists under the python_rc
              # label, so both labels are required to solve.
              export PYTHON_VERSION=3.15.0b4
              export CONDA_EXTRA_PARAM=" python-freethreading -c conda-forge/label/python_dev -c conda-forge/label/python_rc -c conda-forge"
              export OPENSSL_PIN=""
              ;;
            3.15)
              export PYTHON_VERSION=3.15.0b4
              export CONDA_EXTRA_PARAM=" -c conda-forge/label/python_dev -c conda-forge/label/python_rc -c conda-forge"
              export OPENSSL_PIN=""
              ;;
            3.14t)
              export PYTHON_VERSION=3.14
              export CONDA_EXTRA_PARAM=" python-freethreading"
              ;;
          esac

          conda create \
              --yes --quiet \
              --prefix "${CONDA_ENV}" \
              "python=${PYTHON_VERSION}" \
              cmake=3.31.2 \
              ninja=1.12.1 \
              "libwebp>=1.3.2" \
              libpng \
              pkg-config=0.29 \
              wheel=0.37  \
              ${OPENSSL_PIN} \
              ${CONDA_EXTRA_PARAM}

          echo "CONDA_ENV=${CONDA_ENV}" >> "${GITHUB_ENV}"
          echo "CONDA_RUN=conda run --no-capture-output -p ${CONDA_ENV}" >> "${GITHUB_ENV}"
