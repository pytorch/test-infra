name: Set up binary builds

description: Clean workspace and check out PyTorch

inputs:
  repository:
    description: If set to any value, don't use sudo to clean the workspace
    required: false
    type: string
    default: ''
  ref:
    description: Works as stated in actions/checkout
    required: false
    type: string
    default: nightly
  submodules:
    description: Works as stated in actions/checkout, but the default value is recursive
    required: false
    type: string
    default: recursive
  setup-miniconda:
    description: Set to true if setup-miniconda is needed
    required: false
    type: boolean
    default: false
  python-version:
    description: The target Python version
    required: true
    type: string
  cuda-version:
    description: The target CUDA version
    required: true
    type: string
  arch:
    description: The target ARCH
    required: true
    type: string
  upload-to-base-bucket:
    description: One of the parameter used by pkg-helpers
    required: false
    type: boolean
    default: no

runs:
  using: composite
  steps:
      - name: Remove repository directory (if exists)
        shell: bash
        env:
          REPOSITORY: ${{ inputs.repository }}
        run: |
          set -euxo pipefail
          rm -rf "${REPOSITORY}"

      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.submodules }}
          path: ${{ inputs.repository }}

      - name: Log Available Webhook Fields
        shell: bash
        run: |
          echo "ENV VARS"
          echo "${GITHUB_REF_NAME}"
          echo "${GITHUB_REF}"
          echo "${GITHUB_BASE_REF}"

          echo "GITHUB PROVIDED"
          echo "${{ github.ref_name }}"
          echo "${{ github.event.ref }}"
          echo "${{ github.ref }}"
          echo "${{ github.base_ref }}"
      - name: Set artifact name
        shell: bash
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
          CU_VERSION: ${{ inputs.cuda-version }}
          ARCH: ${{ inputs.arch }}
        run: |
          set -euxo pipefail
          # Set artifact name here since github actions doesn't have string manipulation tools
          # and "/" is not allowed in artifact names. //\//_ is to replace all forward slashes,
          # not just the first one
          # Convert long python version (e.g. 3.10.19) to short major.minor version
          # (e.g. 3.10), while preserving special suffixes like "t" (e.g. 3.13t, 3.14t)
          SHORT_PYTHON_VERSION=$(echo "${PYTHON_VERSION}" | sed -E 's/^([0-9]+\.[0-9]+[a-z]?).*/\1/')
          echo "ARTIFACT_NAME=${REPOSITORY//\//_}_${REF//\//_}_${SHORT_PYTHON_VERSION}_${CU_VERSION}_${ARCH}" >> "${GITHUB_ENV}"
      - name: Setup miniconda (for pytorch_pkg_helpers)
        if: ${{ inputs.setup-miniconda == 'true' }}
        uses: conda-incubator/setup-miniconda@v3.1.1
        with:
          miniconda-version: "latest"
          python-version: "3.10"
      - name: Clean conda environment
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          conda info | grep -i 'base environment'
          conda clean --all --quiet --yes
      - name: Reset channel priority
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          conda config --set channel_priority false
      - name: Generate file from pytorch_pkg_helpers
        working-directory: ${{ inputs.repository }}
        shell: bash -l {0}
        run: |
          set -euxo pipefail
          CONDA_ENV="${RUNNER_TEMP}/pytorch_pkg_helpers_${GITHUB_RUN_ID}"
          conda create \
            --yes --quiet \
            --prefix "${CONDA_ENV}" \
            "python=3.10" pip
          CONDA_ENV="${CONDA_ENV}"
          CONDA_RUN="conda run --no-capture-output -p ${CONDA_ENV}"
          ${CONDA_RUN} python -m pip install ${GITHUB_WORKSPACE}/test-infra/tools/pkg-helpers
          BUILD_ENV_FILE="${RUNNER_TEMP}/build_env_${GITHUB_RUN_ID}"
          ${CONDA_RUN} python -m pytorch_pkg_helpers > "${BUILD_ENV_FILE}"
          cat "${BUILD_ENV_FILE}"
          echo "BUILD_ENV_FILE=${BUILD_ENV_FILE}" >> "${GITHUB_ENV}"
      - name: Setup conda environment for build
        shell: bash -l {0}
        env:
          PYTHON_VERSION: ${{ inputs.python-version }}
        run: |
          set -euxo pipefail
          CONDA_ENV="${RUNNER_TEMP}/conda_environment_${GITHUB_RUN_ID}"
          export CONDA_EXTRA_PARAM=""

          # Python 3.15 is still in pre-release and its C-API/ABI is not frozen.
          # conda-forge's python=3.15.0a* does not match the python.org alpha the
          # torch nightly cp315 wheels are built against, so importing torch under
          # the conda interpreter segfaults during module init. Build against the
          # manylinux python.org interpreter that produced the torch wheels
          # instead of conda. pkg-helpers already prepends /opt/python/<abi>/bin
          # to PATH via BUILD_ENV_FILE, so an empty CONDA_RUN makes every
          # `${CONDA_RUN} python|pip` in the build resolve to that interpreter --
          # no ABI skew. We only install the build tooling conda used to provide.
          case $PYTHON_VERSION in
            3.15) MANYLINUX_PYTHON=/opt/python/cp315-cp315/bin/python ;;
            3.15t) MANYLINUX_PYTHON=/opt/python/cp315-cp315t/bin/python ;;
            *) MANYLINUX_PYTHON="" ;;
          esac

          if [ -n "${MANYLINUX_PYTHON}" ]; then
            if [ ! -x "${MANYLINUX_PYTHON}" ]; then
              echo "::error::Expected manylinux interpreter ${MANYLINUX_PYTHON} not found in build image"
              exit 1
            fi
            # Upgrade setuptools too: the cp315 manylinux interpreter ships an
            # old setuptools that can't parse PEP 639 SPDX license metadata
            # (e.g. license = "MIT-CMU"), which breaks building sdists such as
            # pillow (a torchvision smoke-test dependency with no cp315 wheel
            # yet, so pip falls back to building it from source).
            "${MANYLINUX_PYTHON}" -m pip install --upgrade pip setuptools
            # Build tooling that conda used to provide. PyPI's ninja versioning
            # differs from conda's (no 1.12.x on PyPI), so pin to the nearest
            # available release. (libpng/libjpeg/libwebp/pkg-config come from the
            # manylinux image's system packages rather than conda.)
            "${MANYLINUX_PYTHON}" -m pip install \
              "cmake==3.31.2" \
              "ninja==1.13.0" \
              "wheel==0.37.1"
            echo "CONDA_ENV=$(dirname "$(dirname "${MANYLINUX_PYTHON}")")" >> "${GITHUB_ENV}"
            echo "CONDA_RUN=" >> "${GITHUB_ENV}"
            # Some domains install native build deps (e.g. libheif/libavif for
            # torchvision-extra-decoders) via `conda install` in their pre-build
            # script and locate them through $CONDA_PREFIX. The conda path sets
            # CONDA_PREFIX by activating the build env; the manylinux path has no
            # such env, so those deps land in the conda *base* prefix while
            # CONDA_PREFIX stays unset and the build can't find the headers.
            # Export the base prefix so the pre-build `conda install`, setup.py's
            # $CONDA_PREFIX/include header search, and the post-build
            # $CONDA_PREFIX/lib bundling all resolve to the same place.
            echo "CONDA_PREFIX=$(conda info --base)" >> "${GITHUB_ENV}"
            exit 0
          fi

          conda install -y conda=25.3.0

          # shellcheck disable=SC2153
          case $PYTHON_VERSION in
            3.14t)
              export PYTHON_VERSION=3.14
              export CONDA_EXTRA_PARAM=" python-freethreading"
              ;;
          esac

          # Pin openssl=3.5.6: openssl 3.5.7 regressed ASN.1 parsing and rejects a
          # malformed cert in the Windows machine cert store, breaking
          # ssl.create_default_context() with "[ASN1: NOT_ENOUGH_DATA]" at smoke-test
          # time. See https://github.com/pytorch/pytorch/pull/186846
          conda create \
              --yes --quiet \
              --prefix "${CONDA_ENV}" \
              "python=${PYTHON_VERSION}" \
              cmake=3.31.2 \
              ninja=1.12.1 \
              "libwebp>=1.3.2" \
              libpng \
              pkg-config=0.29 \
              wheel=0.37  \
              "openssl=3.5.6" \
              ${CONDA_EXTRA_PARAM}

          echo "CONDA_ENV=${CONDA_ENV}" >> "${GITHUB_ENV}"
          echo "CONDA_RUN=conda run --no-capture-output -p ${CONDA_ENV}" >> "${GITHUB_ENV}"
