name: Cross-Repo CI Relay Callback

description: >
  Report the status of a downstream CI workflow back to the Cross-Repo CI
  Relay server.  The job must have `id-token: write` permission so that a
  GitHub OIDC token can be minted and used to authenticate the callback.

  For PR/push workflows triggered by `repository_dispatch`, the action reads
  `github.event.client_payload` automatically.  For nightly/periodic workflows
  triggered by `schedule` (cron), set `delivery-id` to the upstream commit SHA
  and `event-type` to "nightly" or "periodic" — the action will construct the
  payload from scratch (no client_payload needed).

inputs:
  status:
    description: >
      Workflow status to report.  Must be either "in_progress" or "completed".
      For nightly/periodic event types, only "completed" is accepted.
    required: true
  conclusion:
    description: >
      Conclusion of the workflow run, passed through to the check run as-is
      (typically "job.status").  Required when status is "completed" and
      must be a value GitHub accepts (e.g. success, failure, cancelled).  Ignored
      when status is "in_progress".
    required: false
    default: ''
  delivery-id:
    description: >
      Dispatch ID for the callback.  For PR/push workflows this is read from
      client_payload automatically and should NOT be set.  For nightly/periodic
      workflows (self-triggered via cron), set this to the upstream commit SHA
      that was tested — it becomes the correlation key on the HUD.
    required: false
    default: ''
  event-type:
    description: >
      Event type override.  For PR/push workflows this is read from
      client_payload automatically and should NOT be set.  For nightly/periodic
      workflows, set this to "nightly" or "periodic".
    required: false
    default: ''
  test-results:
    description: >
      Optional JSON string with test result summary (counts: passed/failed/skipped).
      Note: This should be a summary only, not a full enumeration of all test cases.
      Full test results should be uploaded as artifacts and referenced via `artifact-url`.
    required: false
    default: ''
  callback-url:
    description: >
      Base URL of the result callback server.
    required: false
    default: https://gwuj7w5coh4y4l66urspge6mnm0pwaxq.lambda-url.us-east-1.on.aws/github/callback/
  artifact-url:
    description: >
      URL to downstream-hosted artifacts (logs, reports, results),
      any publicly accessible URL.
    required: false
    default: ''
  max-time:
    description: >
      Maximum time in seconds to wait for the callback HTTP request to complete.
    required: false
    default: 10
  job-name:
    description: >
      Identifier for this job, used to name the upstream check run
      (crcr/<repo>/<workflow>/<job-name>). Defaults to github.job, the job's key
      in the workflow file, which is fine for a normal single job. For a MATRIX
      job every leg shares the same github.job, so you MUST pass a value that
      includes the matrix values (for example a job-name of "build-cpu" /
      "build-cuda" for a matrix over cpu/cuda) to give each leg its own check
      run; otherwise the legs collide on the same name.
    required: false
    default: ${{ github.job }}

runs:
  using: composite
  steps:
    - name: Mint OIDC token
      id: oidc
      uses: actions/github-script@v7
      with:
        script: |
          const token = await core.getIDToken("pytorch-cross-repo-ci-relay");
          core.setSecret(token);
          core.setOutput('token', token);

    - name: Send callback to relay server
      shell: bash
      env:
        SCHEMA_VERSION: 1
        STATUS: ${{ inputs.status }}
        CONCLUSION: ${{ inputs.conclusion }}
        WORKFLOW_NAME: ${{ github.workflow }}
        WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        TEST_RESULTS: ${{ inputs.test-results }}
        CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        CALLBACK_URL: ${{ inputs.callback-url }}
        ARTIFACT_URL: ${{ inputs.artifact-url }}
        JOB_NAME: ${{ inputs.job-name }}
        CHECK_RUN_ID: ${{ job.check_run_id }}
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        MAX_TIME: ${{ inputs.max-time }}
        DELIVERY_ID_OVERRIDE: ${{ inputs.delivery-id }}
        EVENT_TYPE_OVERRIDE: ${{ inputs.event-type }}
      run: |
        set -euo pipefail

        PAYLOAD=$(python3 - <<'PYEOF'
        import json, os, sys
        from datetime import datetime, timezone

        status = os.environ["STATUS"]
        delivery_id_override = os.environ.get("DELIVERY_ID_OVERRIDE", "").strip()
        event_type_override = os.environ.get("EVENT_TYPE_OVERRIDE", "").strip()

        if bool(delivery_id_override) != bool(event_type_override):
            sys.exit(
                "::error::Both 'delivery-id' and 'event-type' must be set together "
                "for nightly/periodic mode. Got delivery-id="
                f"{delivery_id_override!r}, event-type={event_type_override!r}"
            )

        is_self_report = bool(delivery_id_override and event_type_override)

        if is_self_report:
            if event_type_override not in ("nightly", "periodic"):
                sys.exit(
                    f"::error::event-type must be 'nightly' or 'periodic', "
                    f"got {event_type_override!r}"
                )
            if status != "completed":
                sys.exit(
                    f"::error::nightly/periodic callbacks require status 'completed', "
                    f"got {status!r}"
                )

        if status not in ("in_progress", "completed"):
            sys.exit(f"::error::status must be 'in_progress' or 'completed', got {status!r}")

        conclusion = os.environ.get("CONCLUSION", "").strip() or None
        if status == "in_progress":
            conclusion = None

        if is_self_report:
            client_payload = {
                "event_type": event_type_override,
                "delivery_id": delivery_id_override,
                "payload": {
                    "repository": {
                        "full_name": "pytorch/pytorch",
                    },
                    "head_sha": delivery_id_override,
                },
            }
        else:
            try:
                client_payload = json.loads(os.environ["CLIENT_PAYLOAD"])
            except json.JSONDecodeError as exc:
                sys.exit(f"::error::github.event.client_payload is not valid JSON: {exc}")

        current_time = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

        check_run_id = os.environ.get("CHECK_RUN_ID", "").strip()
        if not check_run_id:
            check_run_id = f"{os.environ['RUN_ID']}-{os.environ['RUN_ATTEMPT']}"

        workflow: dict = {
            "schema_version": str(os.environ["SCHEMA_VERSION"]),
            "status": status,
            "conclusion": conclusion,
            "name": os.environ["WORKFLOW_NAME"],
            "url": os.environ["WORKFLOW_URL"],
            "run_attempt": os.environ["RUN_ATTEMPT"],
            "job_name": os.environ["JOB_NAME"],
            "check_run_id": check_run_id,
            "run_id": str(os.environ["RUN_ID"]),
            "started_at": None if status == "completed" else current_time,
            "completed_at": None if status == "in_progress" else current_time,
        }

        test_results = os.environ.get("TEST_RESULTS", "").strip()
        if test_results:
            try:
                workflow["test_results"] = json.loads(test_results)
            except json.JSONDecodeError as exc:
                sys.exit(f"::error::test-results input is not valid JSON: {exc}")

        artifact_url = os.environ.get("ARTIFACT_URL", "").strip()
        if artifact_url:
            workflow["artifact_url"] = artifact_url

        client_payload["workflow"] = workflow
        print(json.dumps(client_payload))
        PYEOF
        )

        set +e
        HTTP_CODE=$(
          curl --silent --show-error --fail-with-body --output /tmp/relay_response.json \
            --write-out "%{http_code}" \
            -X POST \
            --max-time ${MAX_TIME} \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            --data "${PAYLOAD}" \
            "${CALLBACK_URL%/}"
        )
        CURL_EXIT_CODE=$?
        set -e

        if [[ "${CURL_EXIT_CODE}" -ne 0 ]]; then
          echo "::error::Callback server returned HTTP ${HTTP_CODE}."
          if [[ -s /tmp/relay_response.json ]]; then
            echo "Relay server error response body:"
            cat /tmp/relay_response.json
          fi
          exit "${CURL_EXIT_CODE}"
        fi

        echo "Relay server response HTTP: ${HTTP_CODE}"
