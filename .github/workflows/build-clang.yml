name: Build Clang and libomp

on:
  pull_request:
    paths:
      - '.github/workflows/build-clang.yml'
      - 'tools/clang-build/**'
  workflow_dispatch:
    inputs:
      clang-versions:
        description: 'JSON list of clang version objects to build (overrides default matrix)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Clang 15 - x86_64
          - clang-version: "15.0.7"
            clang-major: "15"
            arch: x86_64
            runner: mt-l-x86iamx-8-16
            platform: linux-x86_64
            container-image: ghcr.io/pytorch/test-infra:cpu-x86_64-latest
            llvm-targets: "X86"
          # Clang 15 - aarch64
          - clang-version: "15.0.7"
            clang-major: "15"
            arch: aarch64
            runner: mt-l-arm64g2-6-32
            platform: linux-aarch64
            container-image: ghcr.io/pytorch/test-infra:cpu-aarch64-latest
            llvm-targets: "AArch64"
          # Clang 18 - x86_64
          - clang-version: "18.1.8"
            clang-major: "18"
            arch: x86_64
            runner: mt-l-x86iamx-8-16
            platform: linux-x86_64
            container-image: ghcr.io/pytorch/test-infra:cpu-x86_64-latest
            llvm-targets: "X86"
          # Clang 18 - aarch64
          - clang-version: "18.1.8"
            clang-major: "18"
            arch: aarch64
            runner: mt-l-arm64g2-6-32
            platform: linux-aarch64
            container-image: ghcr.io/pytorch/test-infra:cpu-aarch64-latest
            llvm-targets: "AArch64"

    name: clang-${{ matrix.clang-major }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    container:
      image: ${{ matrix.container-image }}
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install build dependencies
        run: |
          set -ex
          # The test-infra CPU image is AlmaLinux 9 (manylinux_2_34) with gcc,
          # make, and Development Tools pre-installed. We just need cmake, ninja,
          # and a few dev libraries for the LLVM build.
          dnf install -y \
            cmake ninja-build python3 \
            wget xz \
            zlib-devel ncurses-devel libxml2-devel libedit-devel

          cmake --version
          ninja --version
          gcc --version

      - name: Build Clang ${{ matrix.clang-version }}
        run: |
          chmod +x tools/clang-build/build.sh
          tools/clang-build/build.sh \
            "${{ matrix.clang-version }}" \
            "${GITHUB_WORKSPACE}/clang-install" \
            "${{ matrix.llvm-targets }}"

      - name: Package artifacts
        id: package
        run: |
          set -ex
          ARTIFACT_NAME="clang-${{ matrix.clang-major }}-${{ matrix.platform }}"

          cd "${GITHUB_WORKSPACE}/clang-install"
          tar czf "${GITHUB_WORKSPACE}/${ARTIFACT_NAME}.tar.gz" .

          cd "${GITHUB_WORKSPACE}"
          sha256sum "${ARTIFACT_NAME}.tar.gz" > "${ARTIFACT_NAME}.tar.gz.sha256"

          echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact-path=${GITHUB_WORKSPACE}/${ARTIFACT_NAME}.tar.gz" >> "$GITHUB_OUTPUT"

          # Print size for visibility
          ls -lh "${ARTIFACT_NAME}.tar.gz"
          cat "${ARTIFACT_NAME}.tar.gz.sha256"

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          retention-days: 90
          if-no-files-found: error
          path: |
            ${{ steps.package.outputs.artifact-name }}.tar.gz
            ${{ steps.package.outputs.artifact-name }}.tar.gz.sha256

      - name: Configure AWS credentials (OIDC)
        if: ${{ github.event_name != 'pull_request' }}
        uses: aws-actions/configure-aws-credentials@67fbcbb121271f7775d2e7715933280b06314838 # v1.7.0
        with:
          role-to-assume: arn:aws:iam::308535385114:role/arc
          aws-region: us-east-1

      - name: Upload artifact to S3
        if: ${{ github.event_name != 'pull_request' }}
        uses: seemethere/upload-artifact-s3@baba72d0712b404f646cebe0730933554ebce96a # v5.1.0
        with:
          if-no-files-found: error
          s3-bucket: gha-artifacts
          s3-prefix: clang/${{ matrix.platform }}/clang-${{ matrix.clang-major }}
          retention-days: 365
          path: |
            ${{ steps.package.outputs.artifact-name }}.tar.gz
            ${{ steps.package.outputs.artifact-name }}.tar.gz.sha256
