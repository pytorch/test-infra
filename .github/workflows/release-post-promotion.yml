name: Release post-promotion SHA256 recompute

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Release project to recompute checksums for"
        required: true
        type: choice
        default: torch
        options:
          - torch
      version:
        description: "Override torch version (defaults to release_versions.sh PYTORCH_VERSION)"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  recompute-sha256:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: promote-env
    container:
      image: pytorch/almalinux-builder:cpu
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure aws credentials (pytorch account)
        uses: aws-actions/configure-aws-credentials@50ac8dd1e1b10d09dac7b8727528b91bed831ac0 # v3.0.2
        with:
          role-to-assume: arn:aws:iam::749337293305:role/gha_workflow_promote_wheels
          aws-region: us-east-1
      - name: Recompute SHA256 on whl/ (prod) for torch release packages
        shell: bash
        env:
          PROJECT: ${{ inputs.project || 'torch' }}
          PYTORCH_VERSION: ${{ inputs.version }}
        run: |
            set -ex
            # Install requirements
            pip install awscli==1.32.18
            pip install -r s3_management/requirements.txt

            # Init release version variables. PYTORCH_VERSION is honored as an
            # override when provided via the workflow input (release_versions.sh
            # uses ${PYTORCH_VERSION:-...}); otherwise the file default is used.
            source ./release/release_versions.sh

            # Recompute missing SHA256 across all prod accelerator subfolders
            # (cu*/rocm*/cpu/xpu) for a package/version. Bare
            # --recompute-sha256-pattern scans every subfolder; existing
            # checksums are skipped.
            recompute() {
              echo "=== Recomputing SHA256 for $1 $2 on whl/ (prod) ==="
              python s3_management/manage_v2.py whl \
                --recompute-sha256-pattern \
                --package-name "$1" \
                --package-version "$2"
            }

            # The torch project covers the core PyTorch wheel set. triton,
            # triton_rocm and triton_xpu all share TRITON_VERSION.
            recompute torch "${PYTORCH_VERSION}"
            recompute torchvision "${TORCHVISION_VERSION}"
            recompute triton "${TRITON_VERSION}"
            recompute triton_rocm "${TRITON_VERSION}"
            recompute triton_xpu "${TRITON_VERSION}"
