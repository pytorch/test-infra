on:
  workflow_call:
    inputs:
      tag:
        type: string
        description: tag to create release
        required: true

name: Upload Release for lambdas

# Build every lambda zip in parallel and stage it as a workflow artifact, then
# publish the release from a single job with one release-action call.
#
# Previously each build job uploaded directly to the release with
# `ncipollo/release-action` (allowUpdates + draft). When the release did not yet
# exist, the parallel jobs each hit "look up by tag -> not found -> create" and
# GitHub allowed multiple draft releases to share the same tag name. The
# artifacts then scattered across those duplicate drafts and `finish-release`
# published only one of them, so a tag could end up missing assets (e.g.
# cross-repo-ci-callback.zip stranded on an unpublished draft). Funnelling all
# uploads through one release-action call removes the concurrent-create race.

jobs:
  build-runner-lambdas:
    name: Build runners lambdas
    runs-on: ubuntu-latest
    container: node:20
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      # Runner Binaries Syncer
      - name: Install dependencies - Runner Binaries Syncer
        run: yarn install
        working-directory: terraform-aws-github-runner/modules/runner-binaries-syncer/lambdas/runner-binaries-syncer
      - name: Build distribution - Runner Binaries Syncer
        run: yarn build
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
        working-directory: terraform-aws-github-runner/modules/runner-binaries-syncer/lambdas/runner-binaries-syncer
      - name: Copy js to root - Runner Binaries Syncer
        run: cp terraform-aws-github-runner/modules/runner-binaries-syncer/lambdas/runner-binaries-syncer/dist/index.js .
      - name: create lambda zip - Runner Binaries Syncer
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: zip runner-binaries-syncer.zip index.js

      # ALI scaleUp scaleDown
      - name: Install dependencies - Runners
        run: yarn install
        working-directory: terraform-aws-github-runner/modules/runners/lambdas/runners
      - name: Build distribution - Runners
        run: yarn build
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
        working-directory: terraform-aws-github-runner/modules/runners/lambdas/runners
      - name: Copy js to root - Runners
        run: cp terraform-aws-github-runner/modules/runners/lambdas/runners/dist/index.js .
      - name: create lambda zip - Runners
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: zip runners.zip index.js

      # Webhook
      - name: Install dependencies - Webhook
        run: yarn install
        working-directory: terraform-aws-github-runner/modules/webhook/lambdas/webhook
      - name: Build distribution - Webhook
        run: yarn build
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
        working-directory: terraform-aws-github-runner/modules/webhook/lambdas/webhook
      - name: Copy js to root - Webhook
        run: cp terraform-aws-github-runner/modules/webhook/lambdas/webhook/dist/index.js .
      - name: create lambda zip- Webhook
        uses: montudor/action-zip@0852c26906e00f8a315c704958823928d8018b28 # v1.0.0
        with:
          args: zip webhook.zip index.js

      - name: Stage runner lambda zips
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lambda-runner-bundle
          path: |
            runner-binaries-syncer.zip
            runners.zip
            webhook.zip
          if-no-files-found: error
          retention-days: 1

  build-python-lambdas:
    strategy:
      fail-fast: false
      matrix:
        include: [
          { dir-name: 'ci-queue-pct', zip-name: 'ci-queue-pct' },
          { dir-name: 'oss_ci_job_queue_time', zip-name: 'oss-ci-job-queue-time' },
          { dir-name: 'oss_ci_cur', zip-name: 'oss-ci-cur' },
          { dir-name: 'benchmark-results-uploader', zip-name: 'benchmark-results-uploader' },
          { dir-name: 'pytorch-auto-revert', zip-name: 'pytorch-auto-revert' },
          { dir-name: 'keep-going-call-log-classifier', zip-name: 'keep-going-call-log-classifier' },
          { dir-name: 'buildkite-webhook-handler', zip-name: 'buildkite-webhook-handler' },
          { dir-name: 'benchmark_regression_summary_report', zip-name: 'benchmark-regression-summary-report' },
          { dir-name: 'cross_repo_ci_relay/callback', zip-name: 'cross-repo-ci-callback' },
          { dir-name: 'cross_repo_ci_relay/webhook', zip-name: 'cross-repo-ci-webhook' },
        ]
    name: Build ${{ matrix.dir-name }} lambda
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Build deployment.zip
        working-directory: aws/lambda/${{ matrix.dir-name }}
        run: make deployment.zip

      - name: Copy deployment.zip to root
        run: cp aws/lambda/${{ matrix.dir-name }}/deployment.zip ${{ matrix.zip-name }}.zip

      - name: Stage ${{ matrix.zip-name }} zip
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lambda-${{ matrix.zip-name }}
          path: ${{ matrix.zip-name }}.zip
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs:
      - build-runner-lambdas
      - build-python-lambdas
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}

      - name: Download all staged lambda zips
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: release-dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -l release-dist

      # Single release-action invocation: create/update the draft with every
      # artifact, then publish. One call -> no concurrent create -> no duplicate
      # releases and no scattered assets.
      - name: Upload artifacts to draft release
        uses: ncipollo/release-action@440c8c1cb0ed28b9f43e4d1d670870f059653174 # v1.16.0
        with:
          artifacts: "release-dist/*.zip"
          allowUpdates: true
          draft: true
          name: ${{ inputs.tag }}
          tag: ${{ inputs.tag }}
          updateOnlyUnreleased: true

      - name: Mark the release as final and publish it
        uses: ncipollo/release-action@440c8c1cb0ed28b9f43e4d1d670870f059653174 # v1.16.0
        with:
          allowUpdates: true
          draft: false
          name: ${{ inputs.tag }}
          tag: ${{ inputs.tag }}
          updateOnlyUnreleased: true
