# Scheduled validation of the nightly binaries
name: Nightly Binaries Validations

on:
  schedule:
    # At 3:30 pm UTC (8:30 am PDT)
    - cron: "30 15 * * *"
  # Have the ability to trigger this job manually through the API
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/validate-nightly-binaries.yml
      - .github/workflows/validate-linux-binaries.yml
      - .github/workflows/validate-windows-binaries.yml
      - .github/workflows/validate-macos-arm64-binaries.yml
      - .github/workflows/validate-aarch64-linux-binaries.yml
      - test/smoke_test/*
  pull_request:
    paths:
      - .github/workflows/validate-nightly-binaries.yml
      - .github/workflows/validate-linux-binaries.yml
      - .github/workflows/validate-windows-binaries.yml
      - .github/workflows/validate-macos-arm64-binaries.yml
      - .github/workflows/validate-aarch64-linux-binaries.yml
      - .github/scripts/validate_binaries.sh
      - test/smoke_test/*

jobs:
  nightly:
    uses: ./.github/workflows/validate-binaries.yml
    with:
      channel: nightly
      # TEMPORARY (revert before merge): scope to linux and torch-only to test
      # the Python 3.15 validation path (no torchvision cp315 wheels yet).
      os: linux
      torchonly: true
