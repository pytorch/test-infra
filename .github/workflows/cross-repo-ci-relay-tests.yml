name: Test cross-repo-ci-relay lambda

on:
  pull_request:
    paths:
      - .github/workflows/cross-repo-ci-relay-tests.yml
      - aws/lambda/cross_repo_ci_relay/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/cross-repo-ci-relay-tests.yml
      - aws/lambda/cross_repo_ci_relay/**

defaults:
  run:
    working-directory: aws/lambda/cross_repo_ci_relay/

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: aws/lambda/cross_repo_ci_relay/requirements.txt
      - name: Install test dependencies
        run: pip install -r requirements.txt pytest
      - name: Run relay tests
        run: make test
