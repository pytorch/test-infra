name: Release PyTorch Post Branch Cut

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 2.12). Determines release branch name and version bump.'
        required: true
        type: string
      dry_run:
        description: 'Dry run - log actions without pushing branches or creating PRs'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  create-release-changes-pr:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: trigger-nightly
    steps:
      - name: Checkout pytorch/pytorch release branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: pytorch/pytorch
          ref: release/${{ inputs.release_version }}
          token: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jinja2==3.1.6 typing_extensions==4.15.0

      - name: Configure git
        run: |
          git config user.name "pytorchbot"
          git config user.email "soumith+bot@pytorch.org"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@50ac8dd1e1b10d09dac7b8727528b91bed831ac0 # v3.0.2
        with:
          role-to-assume: arn:aws:iam::308535385114:role/upload_to_ossci_raw_job_status
          aws-region: us-east-1

      - name: Apply release changes
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          # Run apply-release-changes.sh
          # The script exits with an error at the final git commit/push lines
          # (nothing is staged and RELEASE_BRANCH is undefined), which is
          # expected - we handle commit/push/PR creation below.
          bash scripts/release/apply-release-changes.sh || true

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          BRANCH_NAME="automated/changes-${RELEASE_VERSION}"

          # Check for an existing open PR from this branch
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH_NAME}" \
            --state open \
            --repo pytorch/pytorch \
            --json number \
            --jq '.[0].number // empty')

          git checkout -b "${BRANCH_NAME}"
          git add -A
          git commit -m "$(cat <<EOF
          [RELEASE-ONLY CHANGES] Branch Cut for Release ${RELEASE_VERSION}
          EOF
          )"

          if [ -n "${EXISTING_PR}" ]; then
            git push -f origin "${BRANCH_NAME}"
            echo "Updated existing PR #${EXISTING_PR}"
          else
            git push -f origin "${BRANCH_NAME}"

            gh pr create \
              --title "[RELEASE-ONLY CHANGES] Branch Cut for Release ${RELEASE_VERSION}" \
              --body "$(cat <<'EOF'
          ## Summary

          Release-only changes for the release/${{ inputs.release_version }} branch.

          This PR applies the following changes:
          - Updates workflow references from `@main` to `@release/${{ inputs.release_version }}`
          - Updates templates with release branch references
          - Modifies binary build workflows for release
          - Pins unstable/disabled jobs and tests to current S3 versions
          - Regenerates CI workflows from templates

          Generated by the `release-pytorch-post-branch-cut` workflow using `scripts/release/apply-release-changes.sh`.

          cc: @pytorch/pytorch-dev-infra
          EOF
              )" \
              --base "release/${{ inputs.release_version }}" \
              --head "${BRANCH_NAME}" \
              --repo pytorch/pytorch
          fi

  create-version-bump-pr:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: trigger-nightly
    steps:
      - name: Checkout pytorch/pytorch main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: pytorch/pytorch
          ref: main
          token: ${{ secrets.GH_PYTORCHBOT_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "pytorchbot"
          git config user.email "soumith+bot@pytorch.org"

      - name: Bump version
        id: bump
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          CURRENT_VERSION=$(cat version.txt)
          echo "Current version: ${CURRENT_VERSION}"

          MAJOR=$(echo "${RELEASE_VERSION}" | cut -d'.' -f1)
          MINOR=$(echo "${RELEASE_VERSION}" | cut -d'.' -f2)
          NEXT_MINOR=$((MINOR + 1))
          NEXT_VERSION="${MAJOR}.${NEXT_MINOR}.0a0"

          echo "${NEXT_VERSION}" > version.txt
          echo "next_version=${NEXT_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Bumped version to ${NEXT_VERSION}"

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          NEXT_VERSION: ${{ steps.bump.outputs.next_version }}
        run: |
          BRANCH_NAME="automated/version-bump-${RELEASE_VERSION}"

          # Check for an existing open PR from this branch
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH_NAME}" \
            --state open \
            --repo pytorch/pytorch \
            --json number \
            --jq '.[0].number // empty')

          git checkout -b "${BRANCH_NAME}"
          git add version.txt
          git commit -m "Bump version to ${NEXT_VERSION}"

          if [ -n "${EXISTING_PR}" ]; then
            git push -f origin "${BRANCH_NAME}"
            echo "Updated existing PR #${EXISTING_PR}"
          else
            git push -u origin "${BRANCH_NAME}"

            gh pr create \
              --title "Bump version to ${NEXT_VERSION}" \
              --body "$(cat <<EOF
          ## Summary

          Bump \`version.txt\` to \`${NEXT_VERSION}\` after the release/${RELEASE_VERSION} branch cut.

          cc: @pytorch/pytorch-dev-infra
          EOF
              )" \
              --base main \
              --head "${BRANCH_NAME}" \
              --repo pytorch/pytorch
          fi

  update-test-infra:
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    environment: trigger-nightly
    steps:
      - name: Checkout test-infra
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Configure git
        run: |
          git config user.name "pytorchbot"
          git config user.email "soumith+bot@pytorch.org"

      - name: Update binary build matrix
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          MATRIX_FILE="tools/scripts/generate_binary_build_matrix.py"

          # Read current CURRENT_NIGHTLY_VERSION
          NIGHTLY_VERSION=$(python3 -c "
          import re
          with open('${MATRIX_FILE}') as f:
              content = f.read()
          match = re.search(r'CURRENT_NIGHTLY_VERSION\s*=\s*\"([^\"]+)\"', content)
          print(match.group(1))
          ")
          echo "Current CURRENT_NIGHTLY_VERSION: ${NIGHTLY_VERSION}"

          # Set CURRENT_CANDIDATE_VERSION = CURRENT_NIGHTLY_VERSION
          sed -i "s/^CURRENT_CANDIDATE_VERSION = \".*\"/CURRENT_CANDIDATE_VERSION = \"${NIGHTLY_VERSION}\"/" "${MATRIX_FILE}"
          echo "Updated CURRENT_CANDIDATE_VERSION to ${NIGHTLY_VERSION}"

          # Sync test channel configs with nightly channel configs in all arch dicts
          python3 << 'PYEOF'
          import re

          matrix_file = "tools/scripts/generate_binary_build_matrix.py"
          with open(matrix_file) as f:
              content = f.read()

          dict_names = [
              "PYTHON_ARCHES_DICT",
              "CUDA_ARCHES_DICT",
              "ROCM_ARCHES_DICT",
          ]

          for dict_name in dict_names:
              # Extract the nightly value from the dict
              nightly_match = re.search(
                  rf'{dict_name}\s*=\s*\{{[^}}]*"nightly":\s*(\[[^\]]*\])',
                  content,
                  re.DOTALL,
              )
              if not nightly_match:
                  print(f"WARNING: Could not find nightly value in {dict_name}")
                  continue

              nightly_value = nightly_match.group(1)

              # Replace the test value with the nightly value
              new_content = re.sub(
                  rf'({dict_name}\s*=\s*\{{[^}}]*"test":\s*)\[[^\]]*\]',
                  rf'\g<1>{nightly_value}',
                  content,
                  flags=re.DOTALL,
              )

              if new_content != content:
                  print(f"Synced {dict_name} test channel with nightly: {nightly_value}")
                  content = new_content
              else:
                  print(f"{dict_name} test channel already matches nightly")

          with open(matrix_file, "w") as f:
              f.write(content)
          PYEOF

      - name: Regenerate reference files
        run: |
          python -m tools.tests.test_generate_binary_build_matrix --update-reference-files

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "No changes detected"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Create or update Pull Request
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PYTORCHBOT_TOKEN }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          BRANCH_NAME="automated/update-test-matrix-${RELEASE_VERSION}"

          # Check for an existing open PR from this branch
          EXISTING_PR=$(gh pr list \
            --head "${BRANCH_NAME}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          git checkout -b "${BRANCH_NAME}"
          git add tools/scripts/generate_binary_build_matrix.py
          git add tools/tests/assets/
          git commit -m "$(cat <<EOF
          Update binary build matrix for release ${RELEASE_VERSION}

          Set CURRENT_CANDIDATE_VERSION to match CURRENT_NIGHTLY_VERSION and
          sync test channel configurations with nightly channel.
          EOF
          )"

          if [ -n "${EXISTING_PR}" ]; then
            git push -f origin "${BRANCH_NAME}"
            echo "Updated existing PR #${EXISTING_PR}"
          else
            git push -u origin "${BRANCH_NAME}"

            gh pr create \
              --title "Update binary build matrix for release ${RELEASE_VERSION}" \
              --body "$(cat <<'EOF'
          ## Summary

          Updates the binary build matrix after the release/${{ inputs.release_version }} branch cut:
          - Set `CURRENT_CANDIDATE_VERSION` to match `CURRENT_NIGHTLY_VERSION`
          - Synced test channel arch configurations with nightly channel
          - Regenerated reference build matrix JSON files

          Generated by the `release-pytorch-post-branch-cut` workflow.

          cc: @pytorch/pytorch-dev-infra
          EOF
              )"
          fi

      - name: No changes to commit
        if: steps.check-changes.outputs.has_changes == 'false'
        run: |
          echo "No changes detected in binary build matrix. Skipping PR creation."
