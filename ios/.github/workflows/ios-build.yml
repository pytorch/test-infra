name: iOS Build & Test

on:
  push:
    branches:
      - main
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: xcodebuild -resolvePackageDependencies -project TorchCI.xcodeproj -scheme TorchCI

      - name: Install SwiftLint
        run: brew install swiftlint || true

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging || true

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project TorchCI.xcodeproj \
            -scheme TorchCI \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./build/Build.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project TorchCI.xcodeproj \
            -scheme TorchCI \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./test_output/UnitTests.xcresult \
            -only-testing:TorchCITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output ./test_output/unit-tests.xml

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project TorchCI.xcodeproj \
            -scheme TorchCI \
            -destination "platform=iOS Simulator,name=iPhone 16 Pro,OS=latest" \
            -derivedDataPath ./DerivedData \
            -resultBundlePath ./test_output/UITests.xcresult \
            -only-testing:TorchCIUITests \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color --report junit --output ./test_output/ui-tests.xml
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: test-results
          path: |
            ios/test_output/*.xml
            ios/test_output/*.xcresult
          retention-days: 14

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: build-artifacts
          path: |
            ios/build/*.xcresult
          retention-days: 7
